<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .game-container {
            text-align: center;
        }
        h1 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <p>Use Arrow Keys or WASD to move.</p>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12}
        ];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let speed = 100;

        function main() {
            if (didGameEnd()) {
                alert("Game Over! Score: " + score);
                location.reload();
                return;
            }

            setTimeout(function() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, speed);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            ctx.fillStyle = "lime";
            snake.forEach(part => {
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++;
                createFood();
            }
            else {
                snake.pop();
            }
        }

        function didGameEnd() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            const head = snake[0];
            return head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function drawFood() {
            ctx.fillStyle = "red";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        window.addEventListener('keydown', changeDirection);

        function changeDirection(event) {
            const LEFT = 37;
            const UP = 38;
            const RIGHT = 39;
            const DOWN = 40;
            const w = 87; // W
            const a = 65;  // A
            const s = 83;  // S
            const d = 68;  // D

            const keyPressed = event.keyCode;
            if ((keyPressed === LEFT || keyPressed === a) && dx !== 1) {
                dx = -1; dy = 0;
            }
            if ((keyPressed === UP || keyPressed === w) && dy !== -1) {
                dx = 0; dy = -1;
            }
            if ((keyPressed === RIGHT || keyPressed === d) && dx !== -1) {
                dx = 1; dy = 0;
            }
            if ((keyPressed === DOWN || keyPressed === s) && dy !== 1) {
                dx = 0; dy = 1;
            }
        }

        createFood();
        main();
    </script>
</body>
</html>
